# =============================================================================
# example_rules.conf  –  DIS Translation Gateway rewrite rules
# =============================================================================
#
# Lines beginning with '#' are comments.  Blank lines are ignored.
#
# DIRECTIVES
# ----------
#
#   remap  <field>  <old>=<new>  [<old>=<new> ...]
#       Replace specific field values according to a lookup table.
#       Values are integers or floating-point numbers.
#
#   offset <field>  <delta>
#       Add <delta> to the current field value.  Useful for coordinate offsets.
#
#   set    <field>  <value>
#       Overwrite a numeric field with a constant.
#
#   set_str <field>  <value text>
#       Overwrite a string field (currently only "marking.text").
#
#   drop
#       Silently discard the PDU.  No further rules are evaluated.
#
#   passthrough
#       Explicit no-op – continue to the next rule.
#
#   log  <message>
#       Write a message to stdout (useful for debugging).
#
# CONDITIONAL BLOCKS
# ------------------
#
#   if <field> [== | != | in] <value> [<value2> ...]
#       <actions>
#   endif
#
#   Examples:
#     if pdu_type == 1          # single equality
#     if exercise_id != 99      # inequality
#     if pdu_type in 1 2 3      # membership test
#     if pdu_type 1             # bare value = equality shorthand
#
# FIELD PATHS
# -----------
#
# Header fields (shorthand available):
#   pdu_type | header.pdu_type          protocol_version | header.protocol_version
#   exercise_id | header.exercise_id    timestamp | header.timestamp
#   pdu_status | header.pdu_status
#
# Entity State PDU (pdu_type 1):
#   entity_id.site           entity_id.application      entity_id.entity
#   force_id
#   entity_type.kind         entity_type.domain         entity_type.country
#   entity_type.category     entity_type.subcategory    entity_type.specific
#   entity_type.extra
#   alt_entity_type.<same sub-fields>
#   velocity.x  velocity.y  velocity.z      (m/s, float)
#   location.x  location.y  location.z      (ECEF metres, double)
#   orientation.psi  orientation.theta  orientation.phi   (radians)
#   appearance   capabilities
#   dead_reckoning.algorithm
#   dead_reckoning.linear_acceleration.x/y/z
#   dead_reckoning.angular_velocity.x/y/z
#   marking.character_set   marking.text  (string)
#
# Fire PDU (pdu_type 2):
#   firing_entity_id.site/application/entity
#   target_entity_id.site/application/entity
#   munition_id.site/application/entity
#   event_id.site/application/event_num
#   fire_mission_index
#   location.x/y/z  velocity.x/y/z  range
#   burst_descriptor.warhead  .fuse  .quantity  .rate
#   burst_descriptor.munition.kind/domain/country/category/subcategory/specific/extra
#
# Detonation PDU (pdu_type 3):
#   (same firing/target/munition/event_id fields as Fire)
#   velocity.x/y/z  location.x/y/z
#   burst_descriptor.<same>
#   location_entity_coords.x/y/z
#   detonation_result
#
# =============================================================================


# -----------------------------------------------------------------------------
# 1. Entity-ID site remapping
#    Implementation A uses site 1; implementation B uses site 2.
#    Remap on all PDU types that carry these fields.
# -----------------------------------------------------------------------------
remap entity_id.site          1=2  2=1
remap firing_entity_id.site   1=2  2=1
remap target_entity_id.site   1=2  2=1
remap munition_id.site        1=2  2=1


# -----------------------------------------------------------------------------
# 2. Entity State-specific rewrites
# -----------------------------------------------------------------------------
if pdu_type == 1
    # Fix entity type country code (implementation A omits the correct code)
    # set entity_type.country 225

    # Remap force IDs if the two sides use different conventions
    # remap force_id  1=2  2=1

    # Apply a constant ECEF offset (metres) to correct a coordinate origin mismatch
    # offset location.x 0.0
    # offset location.y 0.0
    # offset location.z 0.0

    # Fix dead-reckoning algorithm enumeration difference
    # remap dead_reckoning.algorithm  2=4  4=2
endif


# -----------------------------------------------------------------------------
# 3. Fire PDU rewrites
# -----------------------------------------------------------------------------
if pdu_type == 2
    # Remap warhead code
    # remap burst_descriptor.warhead  1000=1010

    log "Fire PDU forwarded"
endif


# -----------------------------------------------------------------------------
# 4. Detonation PDU rewrites
# -----------------------------------------------------------------------------
if pdu_type == 3
    log "Detonation PDU forwarded"
endif


# -----------------------------------------------------------------------------
# 5. Drop maintenance / housekeeping exercises
#    Comment out or adjust the exercise ID as needed.
# -----------------------------------------------------------------------------
# if exercise_id == 99
#     drop
# endif


# -----------------------------------------------------------------------------
# 6. Drop any PDU from unknown exercise IDs (whitelist approach)
#    Uncomment and replace the exercise IDs with your valid set.
# -----------------------------------------------------------------------------
# if exercise_id != 1
#     drop
# endif
